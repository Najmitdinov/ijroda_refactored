<div class="panel" id="panel-admin">
        <div class="page-hdr"><h2>👥 Foydalanuvchilar boshqaruvi</h2><p>Yangi foydalanuvchi qo'shish va boshqarish</p></div>
        <div class="card">
          <div class="card-title">➕ Yangi foydalanuvchi (email/parol)</div>
          <div class="form-grid three">
            <div class="field"><label>To'liq ism *</label><input id="new-name" placeholder="F.I.O."></div>
            <div class="field"><label>Email *</label><input type="email" id="new-email" placeholder="email@example.com"></div>
            <div class="field"><label>Parol *</label><input type="password" id="new-pass" placeholder="Kamida 6 ta belgi"></div>
            <div class="field"><label>Tashkilot</label><input id="new-org" placeholder="Tashkilot nomi"></div>
            <div class="field"><label>Rol</label>
              <select id="new-role">
                <option value="user">Foydalanuvchi</option>
                <option value="admin">Admin</option>
                <option value="superadmin">Super Admin</option>
              </select>
            </div>
            <div class="field" style="justify-content:flex-end;"><button class="btn btn-primary" onclick="createUser()">✅ Yaratish</button></div>
          </div>
        </div>
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
            <div class="card-title" style="margin-bottom:0;">👥 Barcha foydalanuvchilar <span id="admin-users-count" class="nav-badge">0</span></div>
            <div class="admin-filters">
              <input id="admin-user-search" placeholder="Search..." oninput="renderAdminUsers()">
              <select id="admin-role-filter" onchange="renderAdminUsers()"><option value="">Barcha rollar</option><option value="user">user</option><option value="admin">admin</option><option value="superadmin">superadmin</option></select>
              <select id="admin-status-filter" onchange="renderAdminUsers()"><option value="">Barcha holatlar</option><option value="active">Faol</option><option value="blocked">Bloklangan</option><option value="online">Online</option></select>
            </div>
          </div>
          <div class="table-wrap">
            <table class="admin-table">
              <thead><tr><th>Ism</th><th>Email/Tel</th><th>Tashkilot</th><th>Rol</th><th>Kirish usuli</th><th>So'nggi kirish</th><th>Holat</th><th>Amallar</th></tr></thead>
              <tbody data-users-tbody><tr><td colspan="8" style="text-align:center;padding:24px;color:var(--muted);">Yuklanmoqda...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
